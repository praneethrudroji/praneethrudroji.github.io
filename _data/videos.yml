# Must-watch videos, grouped by category.
#
# To add a video: paste the full YouTube URL (any of these work as-is):
#   https://www.youtube.com/watch?v=VIDEO_ID
#   https://youtu.be/VIDEO_ID
#   https://www.youtube.com/shorts/VIDEO_ID
# `title` is optional but recommended.
#
# To add a new category, add a new "- category: Name" block below.
# Add `pinned: true` to a category to show a pin icon and keep it at the top
# (categories render in the order they appear in this file).
# Add `channel_url` to a category to show a "Visit channel" link next to it.
#
# Only whoever can push to this repo can edit this file - the page itself
# is read-only for visitors.

